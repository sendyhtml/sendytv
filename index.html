<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Global • Dashboard & Login</title>
  <!-- Font & Icons modern -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- HLS.js untuk player (tetap disertakan) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1120 0%, #0f1829 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    /* Modern glassmorphism container */
    .glass-panel {
      background: rgba(18, 28, 46, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(71, 125, 231, 0.2);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(56, 189, 248, 0.1) inset;
    }

    /* layout utama */
    .app-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }

    /* login / register card */
    .auth-card {
      max-width: 460px;
      margin: 40px auto;
      padding: 36px 32px;
      transition: all 0.2s ease;
    }

    .auth-tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid #1e2c42;
      padding-bottom: 16px;
    }

    .auth-tab {
      font-size: 1.5rem;
      font-weight: 600;
      background: transparent;
      border: none;
      color: #8699bb;
      padding: 8px 4px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }

    .auth-tab.active {
      color: white;
    }

    .auth-tab.active::after {
      content: '';
      position: absolute;
      bottom: -17px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #3b82f6;
      border-radius: 3px 3px 0 0;
      box-shadow: 0 0 12px #3b82f6;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #90a3c0;
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: #0f1a2b;
      border: 1px solid #25344f;
      border-radius: 24px;
      padding: 14px 20px;
      font-size: 1rem;
      color: white;
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
    }

    .btn {
      background: linear-gradient(145deg, #2563eb, #1d4ed8);
      border: none;
      border-radius: 40px;
      padding: 14px 28px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      width: 100%;
      cursor: pointer;
      box-shadow: 0 10px 20px -8px #1e3a8a;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn:hover {
      background: linear-gradient(145deg, #2e6af0, #2563eb);
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -8px #0f2b6b;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #3b82f6;
      box-shadow: none;
      color: #b0c8f0;
    }

    .btn-outline:hover {
      background: rgba(59,130,246,0.15);
      transform: none;
      box-shadow: 0 8px 16px -8px #1e3a8a;
    }

    .separator {
      display: flex;
      align-items: center;
      color: #3f5070;
      font-size: 0.8rem;
      margin: 24px 0;
    }

    .separator::before, .separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #25344f;
    }

    .separator span {
      margin: 0 12px;
    }

    /* dashboard */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 26, 43, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 80px;
      padding: 12px 20px 12px 28px;
      margin-bottom: 32px;
      border: 1px solid #263a5a;
      box-shadow: 0 12px 30px -10px #010314;
    }

    .greeting {
      font-size: 1.3rem;
      font-weight: 500;
    }

    .greeting span {
      color: #90d2ff;
      font-weight: 600;
    }

    .profile-badge {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #2563eb, #7b3fe4);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.4rem;
      color: white;
      text-transform: uppercase;
      box-shadow: 0 8px 18px #1e2b4e;
      border: 2px solid rgba(255,255,255,0.3);
    }

    .logout-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid #364d73;
      border-radius: 40px;
      padding: 12px 20px;
      color: #cbd5e1;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .logout-btn:hover {
      background: #2d405b;
      color: white;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }

    .stats-card {
      background: rgba(18, 31, 51, 0.7);
      backdrop-filter: blur(5px);
      border-radius: 32px;
      padding: 28px;
      border: 1px solid #2a3d60;
    }

    .stats-card i {
      font-size: 2.2rem;
      color: #3b82f6;
      margin-bottom: 16px;
    }

    .stats-card h3 {
      font-size: 1.2rem;
      font-weight: 400;
      color: #a7c0e6;
    }

    .stats-card .value {
      font-size: 2.5rem;
      font-weight: 700;
      margin-top: 8px;
      background: linear-gradient(to right, #fff, #bdd3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tv-launch-card {
      grid-column: span 2;
      background: linear-gradient(145deg, #1e2b48, #111f38);
      border-radius: 40px;
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #3361ad;
    }

    .tv-launch-text h2 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .tv-launch-text p {
      color: #9bb3da;
    }

    .tv-button {
      background: #3b82f6;
      border: none;
      border-radius: 60px;
      padding: 18px 42px;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 20px 35px -10px #1e3a8a;
      transition: 0.15s;
      border: 1px solid #93c5fd;
    }

    .tv-button i {
      font-size: 1.5rem;
    }

    .tv-button:hover {
      background: #2563eb;
      transform: scale(1.02);
      box-shadow: 0 25px 40px -8px #1e3a8a;
    }

    /* channel list preview */
    .channel-preview {
      background: rgba(12, 22, 38, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 24px;
      border: 1px solid #263e62;
      margin-top: 24px;
    }

    .channel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #1e3452;
    }

    .channel-row img {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #162b44;
      object-fit: cover;
    }

    .dummy-channel {
      background: #1d324b;
      height: 40px;
      border-radius: 12px;
      flex: 1;
    }

    /* utility */
    .hidden {
      display: none !important;
    }

    .text-small {
      color: #7f96bb;
    }

    footer {
      text-align: center;
      padding: 28px;
      color: #42577b;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .tv-launch-card {
        flex-direction: column;
        text-align: center;
        gap: 24px;
      }
    }
  </style>
</head>
<body>

<div class="app-wrapper" id="appWrapper">

  <!-- HALAMAN LOGIN / REGISTER (akan tampil jika tidak login) -->
  <div id="authSection">
    <div class="auth-card glass-panel">
      <!-- Tab Login / Daftar -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTabBtn" onclick="switchAuthTab('login')">Masuk</button>
        <button class="auth-tab" id="registerTabBtn" onclick="switchAuthTab('register')">Daftar</button>
      </div>

      <!-- FORM LOGIN -->
      <div id="loginForm">
        <div class="input-group">
          <label><i class="far fa-user" style="margin-right:6px;"></i> Nama Pengguna</label>
          <input type="text" class="input-field" id="loginUsername" placeholder="cth: aditama" autocomplete="off">
        </div>
        <div class="input-group">
          <label><i class="far fa-lock" style="margin-right:6px;"></i> Kata Sandi</label>
          <input type="password" class="input-field" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn" onclick="handleLogin()"><i class="fas fa-sign-in-alt" style="margin-right:8px;"></i> Masuk</button>

        <div class="separator"><span>ATAU</span></div>
        <button class="btn-outline btn" onclick="quickDemoLogin()"><i class="far fa-id-card"></i> Demo (user: tamu)</button>
      </div>

      <!-- FORM REGISTER -->
      <div id="registerForm" class="hidden">
        <div class="input-group">
          <label><i class="far fa-user"></i> Nama Lengkap</label>
          <input type="text" class="input-field" id="regName" placeholder="misal: Budi Santoso">
        </div>
        <div class="input-group">
          <label><i class="far fa-envelope"></i> Email (opsional)</label>
          <input type="email" class="input-field" id="regEmail" placeholder="email@contoh.com">
        </div>
        <div class="input-group">
          <label><i class="far fa-key"></i> Kata Sandi</label>
          <input type="password" class="input-field" id="regPassword" placeholder="min 4 karakter">
        </div>
        <button class="btn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Daftar & Lanjut</button>
        <p class="text-small" style="margin-top:20px; text-align:center;">Dengan mendaftar, Anda bisa masuk kembali kapan saja.</p>
      </div>
    </div>
  </div>

  <!-- HALAMAN DASHBOARD (akan tampil setelah login) -->
  <div id="dashboardSection" class="hidden">
    <!-- header dengan profile & inisial -->
    <div class="dashboard-header">
      <div class="greeting">
        👋 Selamat datang, <span id="displayName">User</span>
      </div>
      <div class="profile-badge">
        <div class="avatar" id="avatarInitials">U</div>
        <div class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt" style="margin-right:6px;"></i> Keluar
        </div>
      </div>
    </div>

    <!-- grid dashboard modern -->
    <div class="dashboard-grid">
      <div class="stats-card">
        <i class="fas fa-tower-broadcast"></i>
        <h3>Total Channel</h3>
        <div class="value">180+</div>
      </div>
      <div class="stats-card">
        <i class="fas fa-globe"></i>
        <h3>Negara</h3>
        <div class="value">24</div>
      </div>
    </div>

    <!-- Tombol utama ke halaman siaran TV (tv5) -->
    <div class="tv-launch-card">
      <div class="tv-launch-text">
        <h2><i class="fas fa-tv-retro" style="margin-right:12px;"></i>SendyTV Global</h2>
        <p>Ribuan siaran dari seluruh dunia. Klik untuk menonton.</p>
      </div>
      <button class="tv-button" onclick="launchTvPage()">
        <i class="fas fa-play"></i> Tonton Siaran TV
      </button>
    </div>

  <footer>
    <i class="far fa-copyright"></i> Sendy TV
  </footer>
</div>

<script>
  (function() {
    // Simulasi localStorage untuk menyimpan sesi login dan user terdaftar
    // Default: jika ada sesi "loggedInUser", langsung dashboard.

    // Data registrasi sederhana (disimpan di localStorage)
    const STORAGE_USERS = 'tv_users';
    const STORAGE_SESSION = 'tv_session';

    // Helper: inisialisasi data pengguna terdaftar jika kosong
    function initUserDB() {
      if (!localStorage.getItem(STORAGE_USERS)) {
        // buat satu akun default untuk demo: tamu / 123456
        const defaultUsers = [
          { fullName: 'Tamu', email: 'tamu@demo.com', password: '123456', username: 'tamu' }
        ];
        localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
      }
    }
    initUserDB();

    // Cek session saat load
    let currentUser = null;
    const sessionData = localStorage.getItem(STORAGE_SESSION);
    if (sessionData) {
      try {
        currentUser = JSON.parse(sessionData);
      } catch (e) {}
    }

    // elemen
    const authDiv = document.getElementById('authSection');
    const dashboardDiv = document.getElementById('dashboardSection');
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const loginTabBtn = document.getElementById('loginTabBtn');
    const registerTabBtn = document.getElementById('registerTabBtn');
    const displayNameSpan = document.getElementById('displayName');
    const avatarInitSpan = document.getElementById('avatarInitials');

    // perbarui tampilan berdasarkan session
    function updateUIBasedOnSession() {
      if (currentUser) {
        authDiv.classList.add('hidden');
        dashboardDiv.classList.remove('hidden');
        // set nama dan inisial
        let name = currentUser.fullName || currentUser.username || 'User';
        displayNameSpan.innerText = name;
        let initial = name.charAt(0).toUpperCase();
        avatarInitSpan.innerText = initial;
      } else {
        authDiv.classList.remove('hidden');
        dashboardDiv.classList.add('hidden');
        // reset tab ke login
        switchAuthTab('login');
      }
    }

    // switch tab login / register
    window.switchAuthTab = function(tab) {
      if (tab === 'login') {
        loginFormDiv.classList.remove('hidden');
        registerFormDiv.classList.add('hidden');
        loginTabBtn.classList.add('active');
        registerTabBtn.classList.remove('active');
      } else {
        loginFormDiv.classList.add('hidden');
        registerFormDiv.classList.remove('hidden');
        loginTabBtn.classList.remove('active');
        registerTabBtn.classList.add('active');
      }
    };

    // fungsi login
    window.handleLogin = function() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!username || !password) {
        alert('Isi nama pengguna dan kata sandi');
        return;
      }

      const users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
      // login bisa pake username atau fullName (kita cocokkan)
      const foundUser = users.find(u => (u.username?.toLowerCase() === username.toLowerCase() || u.fullName?.toLowerCase() === username.toLowerCase()) && u.password === password);
      
      if (foundUser) {
        // set session
        currentUser = { fullName: foundUser.fullName, username: foundUser.username || foundUser.fullName };
        localStorage.setItem(STORAGE_SESSION, JSON.stringify(currentUser));
        updateUIBasedOnSession();
        // bersihkan input
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
      } else {
        alert('Nama pengguna atau kata sandi salah. Coba "tamu" / "123456" .');
      }
    };

    // demo login cepat (user tamu)
    window.quickDemoLogin = function() {
      const users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
      const guest = users.find(u => u.username === 'tamu' || u.fullName === 'Tamu');
      if (guest) {
        currentUser = { fullName: guest.fullName, username: guest.username };
        localStorage.setItem(STORAGE_SESSION, JSON.stringify(currentUser));
        updateUIBasedOnSession();
      } else {
        // fallback buat user tamu
        const newGuest = { fullName: 'Tamu', username: 'tamu', password: '123456' };
        users.push(newGuest);
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        currentUser = { fullName: 'Tamu', username: 'tamu' };
        localStorage.setItem(STORAGE_SESSION, JSON.stringify(currentUser));
        updateUIBasedOnSession();
      }
    };

    // register handler
    window.handleRegister = function() {
      const fullName = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value.trim();

      if (!fullName || !password) {
        alert('Nama dan kata sandi wajib diisi');
        return;
      }
      if (password.length < 4) {
        alert('Kata sandi minimal 4 karakter');
        return;
      }

      const users = JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
      // cek apakah nama sudah dipakai sebagai fullName atau username (sederhana)
      const exists = users.some(u => u.fullName?.toLowerCase() === fullName.toLowerCase() || u.username?.toLowerCase() === fullName.toLowerCase());
      if (exists) {
        alert('Nama pengguna sudah terdaftar, silakan gunakan nama lain');
        return;
      }

      const newUser = {
        fullName: fullName,
        email: email,
        password: password,
        username: fullName.toLowerCase().replace(/\s/g, '') // username otomatis
      };
      users.push(newUser);
      localStorage.setItem(STORAGE_USERS, JSON.stringify(users));

      // langsung login setelah register
      currentUser = { fullName: fullName, username: newUser.username };
      localStorage.setItem(STORAGE_SESSION, JSON.stringify(currentUser));
      updateUIBasedOnSession();

      // reset field
      document.getElementById('regName').value = '';
      document.getElementById('regEmail').value = '';
      document.getElementById('regPassword').value = '';
    };

    // logout
    window.logout = function() {
      localStorage.removeItem(STORAGE_SESSION);
      currentUser = null;
      updateUIBasedOnSession();
    };

    // tombol ke siaran tv (tv5) -> kita buka file tv5.html (di folder yang sama)
    window.launchTvPage = function() {
      // Karena dalam satu lingkungan, kita bisa arahkan ke tv5.html
      // Untuk keperluan demo, kita asumsikan file tv5.html berada di path relatif sama.
      // Jika ingin preview di sini tanpa pindah halaman, kita bisa buka tab baru.
      // Namun diminta: "Tombol Yang Mengarah ke Halaman Siaran TV nya / tv5.html"
      window.location.href = 'tv5.html'; 
      // Fallback: jika ingin mencoba embedded bisa, tapi lebih baik redirect.
    };

    // inisialisasi tampilan
    updateUIBasedOnSession();

    // tambahan kecil: jika pengguna membuka tv5.html setelah login, kita bisa pastikan di sana ada akses.
    // Di file tv5.html sebelumnya, tidak ada sistem login. tapi kita akan biarkan sesuai permintaan:
    // "Dan Ada Tombol Yang Mengarah ke Halaman Siaran TV nya / tv5.html" sudah di-launchTvPage.
    // Opsional, kita bisa menambahkan sedikit style konsisten, tapi diarahkan ke file asli.

  })();
</script>

<!-- Catatan: file tv5.html diharapkan ada di direktori yang sama. Jika ingin menguji, 
     pastikan tv5.html tersedia (dari soal sebelumnya). Di sini kita hanya menambahkan halaman login/dashboard. 
     Agar pengalaman utuh, user bisa kembali dengan logout. -->
</body>
</html>
