<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendyTV • Live</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1120 0%, #0f1a2f 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Glassmorphism header */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(2, 6, 23, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px 20px;
    }

    .search-wrapper {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(15, 25, 40, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 8px 16px 8px 20px;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .search-box:focus-within {
      border-color: #3b82f6;
      background: rgba(20, 30, 50, 0.9);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
    }

    .search-box i {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-right: 12px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1rem;
      padding: 8px 0;
    }

    .search-box input::placeholder {
      color: #5f6c86;
      font-weight: 300;
    }

    /* Player section */
    .player-section {
      background: #050a15;
      padding: 20px 20px 10px 20px;
      border-bottom: 1px solid #1e2a44;
    }

    #player {
      max-width: 1000px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 40px -10px black;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #000;
    }

    video {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      background: black;
    }

    /* channel counter */
    .channel-stats {
      max-width: 1000px;
      margin: 18px auto 8px auto;
      padding: 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #a0b3d9;
      font-size: 0.9rem;
    }

    .badge {
      background: #1e2c48;
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.8rem;
      color: #b9d0ff;
      border: 1px solid #314b74;
    }

    /* Grid channel list */
    .channels-container {
      max-width: 1200px;
      margin: 10px auto 30px auto;
      padding: 0 20px;
    }

    #channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .channel-card {
      background: rgba(15, 25, 45, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid #253450;
      border-radius: 20px;
      padding: 18px 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    }

    .channel-card:hover {
      background: #1f314f;
      border-color: #3b5b9e;
      transform: translateY(-4px);
      box-shadow: 0 14px 26px -6px #0f1f40;
    }

    .channel-logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #122137;
      object-fit: cover;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      border: 1px solid #3f5680;
    }

    .channel-info {
      flex: 1;
      overflow: hidden;
    }

    .channel-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f0f4ff;
    }

    .channel-group {
      font-size: 0.7rem;
      color: #8fa4d0;
      margin-top: 4px;
      display: inline-block;
      background: rgba(45, 70, 120, 0.4);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #314e7a;
      text-transform: capitalize;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* loading shimmer */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #5f7bbf;
      font-size: 1.2rem;
    }

    /* responsive */
    @media (max-width: 600px) {
      #channels {
        grid-template-columns: 1fr;
      }
      .channel-card {
        padding: 14px;
      }
    }

    /* custom scroll */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a1425;
    }
    ::-webkit-scrollbar-thumb {
      background: #25406a;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3b5e96;
    }

    /* empty state */
    .no-result {
      grid-column: 1/-1;
      text-align: center;
      padding: 40px 20px;
      background: #0f1a2b;
      border-radius: 40px;
      border: 1px dashed #3a5270;
      color: #95abda;
    }
  </style>
</head>
<body>

<header>
  <div class="search-wrapper">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search" placeholder="Cari channel atau kategori...">
    </div>
  </div>
</header>

<div class="player-section">
  <div id="player">
    <video id="video" controls playsinline></video>
  </div>
  <div class="channel-stats">
    <span><i class="fas fa-tv" style="margin-right: 6px;"></i><span id="channel-count">0</span> channel</span>
    <span class="badge"><i class="fas fa-circle" style="color: #10b981; font-size: 0.5rem;"></i> LIVE</span>
  </div>
</div>

<div class="channels-container">
  <div id="channels">
    <!-- akan diisi javascript -->
    <div class="loading-state">
      <i class="fas fa-spinner fa-pulse" style="margin-right: 8px;"></i> Memuat daftar channel...
    </div>
  </div>
</div>

<script>
  const playlistURL = "https://iptv-org.github.io/iptv/index.m3u";

  let channels = [];
  let filtered = [];

  const channelsEl = document.getElementById("channels");
  const searchEl = document.getElementById("search");
  const video = document.getElementById("video");
  const channelCountSpan = document.getElementById("channel-count");

  function parseM3U(text) {
    const lines = text.split("\n");
    let currentChannel = null;

    channels = []; // reset

    lines.forEach(line => {
      line = line.trim();

      if (line.startsWith("#EXTINF")) {
        // ambil name setelah koma terakhir
        let name = line.split(",").pop() || "Untitled";
        let logo = (line.match(/tvg-logo="(.*?)"/) || [])[1];
        let group = (line.match(/group-title="(.*?)"/) || [])[1] || "Lainnya";

        currentChannel = {
          name: name,
          logo: logo,
          group: group,
        };
      } else if (line && !line.startsWith("#") && currentChannel) {
        // ini adalah URL
        currentChannel.url = line;
        channels.push(currentChannel);
        currentChannel = null;
      }
    });

    filtered = [...channels];
    render();
  }

  function render() {
    if (!channelsEl) return;

    if (filtered.length === 0) {
      channelsEl.innerHTML = `<div class="no-result"><i class="fa-regular fa-frown" style="font-size:2rem; margin-bottom:10px; display:block;"></i>Tidak ada channel ditemukan</div>`;
      channelCountSpan.innerText = '0';
      return;
    }

    let html = '';
    filtered.forEach(ch => {
      html += `
        <div class="channel-card" data-url="${ch.url}">
          <img class="channel-logo" src="${ch.logo || 'https://placehold.co/60x60/1e2b44/white?text=' + ch.name.charAt(0)}" 
               alt="${ch.name}" loading="lazy" 
               onerror="this.src='https://placehold.co/60x60/1e2b44/white?text=' + '${ch.name.charAt(0)}';">
          <div class="channel-info">
            <div class="channel-name">${ch.name}</div>
            <div class="channel-group"><i class="fa-regular fa-folder" style="margin-right: 4px;"></i>${ch.group}</div>
          </div>
        </div>
      `;
    });

    channelsEl.innerHTML = html;
    channelCountSpan.innerText = filtered.length;

    // tambahkan event listener ke masing-masing card
    document.querySelectorAll('.channel-card').forEach(card => {
      card.addEventListener('click', (e) => {
        const url = card.dataset.url;
        if (url) play(url);
      });
    });
  }

  function play(url) {
    // reset src
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (Hls.isSupported() && url.includes('.m3u8')) {
      const hls = new Hls({ 
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 30 
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(e => console.log('autoplay blocked', e));
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl') || !url.includes('.m3u8')) {
      // untuk Safari / file biasa
      video.src = url;
      video.addEventListener('loadedmetadata', () => {
        video.play().catch(e => console.log('autoplay prevented', e));
      });
    } else {
      video.src = url;
      video.play().catch(e => console.log('fallback play error', e));
    }
  }

  // Search dengan debounce sederhana
  let searchTimeout;
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = searchEl.value.trim().toLowerCase();
      if (q === '') {
        filtered = [...channels];
      } else {
        filtered = channels.filter(ch => 
          ch.name.toLowerCase().includes(q) || 
          (ch.group && ch.group.toLowerCase().includes(q))
        );
      }
      render();
    }, 200);
  });

  // Fetch playlist
  fetch(playlistURL)
    .then(r => {
      if (!r.ok) throw new Error('Gagal ambil playlist');
      return r.text();
    })
    .then(parseM3U)
    .catch(err => {
      channelsEl.innerHTML = `<div class="no-result"><i class="fa-solid fa-triangle-exclamation" style="color:#f97316;"></i> Gagal memuat channel. Coba refresh.</div>`;
      console.error(err);
    });

  // Optional: click outside to hide? tidak perlu
</script>
</body>
</html>
