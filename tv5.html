<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendyTV • Live TV</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Google Fonts - JetBrains Mono (mono modern) -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    body {
      background: #0a0c15;
      color: #e0edff;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Glow effect background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(0, 100, 255, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 122, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 122, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }

    /* Header SendyTV - Modern dengan glow */
    .sendy-header {
      background: rgba(8, 12, 25, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid #2563eb;
      padding: 16px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 10px 30px rgba(0, 50, 200, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-icon {
      font-size: 2.2rem;
      color: #3b82f6;
      filter: drop-shadow(0 0 15px #3b82f6);
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #90caf9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .logo-text span {
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .dashboard-link {
      background: rgba(20, 40, 80, 0.5);
      border: 1px solid #3b82f6;
      color: white;
      padding: 10px 22px;
      border-radius: 40px;
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 10px #2563eb;
    }

    .dashboard-link:hover {
      background: #2563eb;
      border-color: white;
      box-shadow: 0 0 20px #3b82f6;
    }

    /* Search header */
    .search-header {
      position: sticky;
      top: 80px;
      z-index: 90;
      background: rgba(6, 10, 20, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e3a8a;
      padding: 16px 20px;
    }

    .search-wrapper {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #0f1a2b;
      border: 1px solid #1e3a8a;
      border-radius: 60px;
      padding: 8px 16px 8px 22px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .search-box:focus-within {
      border-color: #3b82f6;
      box-shadow: 0 0 20px #2563eb, 0 4px 20px black;
    }

    .search-box i {
      color: #3b82f6;
      font-size: 1.2rem;
      margin-right: 12px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 0.95rem;
      padding: 8px 0;
      font-family: 'JetBrains Mono', monospace;
    }

    .search-box input::placeholder {
      color: #4a6382;
    }

    /* Category tabs */
    .category-tabs {
      max-width: 1200px;
      margin: 20px auto 10px;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .category-btn {
      background: rgba(10, 20, 40, 0.7);
      border: 1px solid #1e3a8a;
      color: #b0cbf5;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.5px;
    }

    .category-btn i {
      font-size: 1rem;
    }

    .category-btn:hover, .category-btn.active {
      background: #2563eb;
      border-color: #a5d8ff;
      color: white;
      box-shadow: 0 0 20px #3b82f6;
    }

    .category-btn.active {
      background: #2563eb;
      border-color: white;
      box-shadow: 0 0 25px #3b82f6;
    }

    /* Player section */
    .player-section {
      background: #030712;
      padding: 20px 20px 15px;
      border-bottom: 2px solid #1e3a8a;
      box-shadow: inset 0 -10px 30px rgba(0,0,0,0.8);
    }

    #player {
      max-width: 1000px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 50, 200, 0.4);
      border: 1px solid #2563eb;
    }

    video {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      background: black;
    }

    .channel-stats {
      max-width: 1000px;
      margin: 18px auto 8px;
      padding: 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #90a9d0;
      font-size: 0.8rem;
    }

    .badge {
      background: #0f1a30;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 500;
      border: 1px solid #2563eb;
      box-shadow: 0 0 10px #2563eb;
    }

    /* Favorite section */
    .favorite-section {
      max-width: 1200px;
      margin: 30px auto 20px;
      padding: 0 20px;
    }

    .favorite-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      background: rgba(37, 99, 235, 0.15);
      padding: 12px 25px;
      border-radius: 60px;
      border: 1px solid #2563eb;
      backdrop-filter: blur(8px);
    }

    .favorite-header i:first-child {
      color: #fbbf24;
      font-size: 1.6rem;
      filter: drop-shadow(0 0 12px gold);
    }

    .favorite-header h3 {
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
    }

    .favorite-header span {
      background: #2563eb;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      margin-left: 10px;
    }

    #favorite-channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .favorite-card {
      background: rgba(15, 25, 45, 0.9);
      backdrop-filter: blur(4px);
      border: 2px solid #fbbf24;
      border-radius: 24px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      position: relative;
    }

    .favorite-card:hover {
      transform: translateY(-4px);
      border-color: #ffd966;
      background: #1e3260;
      box-shadow: 0 0 25px #fbbf24;
    }

    .favorite-card img {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      object-fit: cover;
      border: 2px solid #fbbf24;
    }

    .favorite-info {
      flex: 1;
    }

    .favorite-name {
      font-weight: 600;
      font-size: 0.85rem;
      color: #ffefb0;
    }

    .favorite-group {
      font-size: 0.65rem;
      color: #a0b9f0;
    }

    .remove-fav {
      position: absolute;
      top: 6px;
      right: 6px;
      color: #ff8a8a;
      font-size: 0.7rem;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .remove-fav:hover {
      background: #ff4444;
      color: white;
    }

    /* Grid channel list */
    .channels-container {
      max-width: 1200px;
      margin: 20px auto 40px;
      padding: 0 20px;
    }

    #channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .channel-card {
      background: rgba(8, 15, 30, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid #1e3a8a;
      border-radius: 28px;
      padding: 20px 15px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: 0.2s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      position: relative;
    }

    .channel-card:hover {
      background: #13233f;
      border-color: #3b82f6;
      transform: translateY(-4px);
      box-shadow: 0 0 25px #2563eb, 0 10px 25px black;
    }

    .favorite-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #94a9d0;
      font-size: 1rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      z-index: 5;
    }

    .favorite-btn:hover {
      background: #2563eb;
      color: white;
    }

    .favorite-btn.active {
      color: #fbbf24;
      text-shadow: 0 0 10px gold;
    }

    .favorite-btn.active:hover {
      color: #ff6b6b;
    }

    .channel-logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: #0a1428;
      object-fit: cover;
      border: 2px solid #2563eb;
      box-shadow: 0 0 12px #2563eb;
      cursor: pointer;
    }

    .channel-info {
      flex: 1;
      overflow: hidden;
      cursor: pointer;
    }

    .channel-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f0f4ff;
      padding-right: 30px;
    }

    .channel-group {
      font-size: 0.65rem;
      color: #8fa9e0;
      margin-top: 6px;
      display: inline-block;
      background: rgba(37, 99, 235, 0.2);
      padding: 4px 12px;
      border-radius: 30px;
      border: 1px solid #2563eb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      color: #3b82f6;
      font-size: 1rem;
    }

    .no-result {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px 20px;
      background: #0f1a2b;
      border-radius: 40px;
      border: 2px dashed #2563eb;
      color: #90a9ff;
    }

    @media (max-width: 600px) {
      #channels { grid-template-columns: 1fr; }
      .sendy-header { flex-direction: column; gap: 15px; text-align: center; }
      .logo-text { font-size: 1.5rem; }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0a1020;
    }
    ::-webkit-scrollbar-thumb {
      background: #2563eb;
      border-radius: 10px;
      box-shadow: 0 0 10px #3b82f6;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3b82f6;
    }
  </style>
</head>
<body>

<!-- Header SendyTV Neo -->
<header class="sendy-header">
  <div class="logo-area">
    <i class="fas fa-satellite-dish logo-icon"></i>
    <div class="logo-text">Sendy<span>TV</span></div>
  </div>
  <a href="index.html" class="dashboard-link">
    <i class="fas fa-arrow-left"></i> # Kembali
  </a>
</header>

<!-- Search header -->
<div class="search-header">
  <div class="search-wrapper">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search" placeholder="$ cari channel atau grup...">
    </div>
  </div>
</div>

<!-- Category tabs -->
<div class="category-tabs">
  <button class="category-btn active" onclick="filterCategory('semua')"><i class="fas fa-tv"></i> ~semua</button>
  <button class="category-btn" onclick="filterCategory('indonesia')"><i class="fas fa-flag"></i> ~indonesia</button>
</div>

<!-- Player section -->
<div class="player-section">
  <div id="player">
    <video id="video" controls playsinline></video>
  </div>
  <div class="channel-stats">
    <span><i class="fas fa-tv" style="margin-right: 6px;"></i><span id="channel-count">0</span> channel</span>
    <span class="badge"><i class="fas fa-circle" style="color: #10b981; font-size: 0.5rem;"></i> LIVE</span>
  </div>
</div>

<!-- Favorite section -->
<div class="favorite-section">
  <div class="favorite-header">
    <i class="fas fa-star"></i>
    <h3>favorit<span id="favorite-count">0</span></h3>
    <i class="fas fa-thumbtack" style="color: #fbbf24; margin-left: auto;"></i>
  </div>
  <div id="favorite-channels">
    <!-- akan diisi js -->
  </div>
</div>

<!-- Channels container -->
<div class="channels-container">
  <div id="channels">
    <div class="loading-state">
      <i class="fas fa-spinner fa-pulse" style="margin-right: 8px;"></i> loading stream...
    </div>
  </div>
</div>

<script>
  const playlistURL = "https://iptv-org.github.io/iptv/index.m3u";

  let channels = [];
  let filtered = [];
  let activeFilter = 'semua';
  
  // Load favorites from localStorage
  let favorites = JSON.parse(localStorage.getItem('sendytv_favorites')) || [];

  const channelsEl = document.getElementById("channels");
  const searchEl = document.getElementById("search");
  const video = document.getElementById("video");
  const channelCountSpan = document.getElementById("channel-count");
  const categoryBtns = document.querySelectorAll('.category-btn');
  const favoriteSection = document.getElementById('favorite-channels');
  const favoriteCountSpan = document.getElementById('favorite-count');

  // Daftar channel Indonesia
  const indonesianChannels = [
    { name: 'RCTI', logo: 'https://upload.wikimedia.org/wikipedia/id/6/6c/RCTI.png', group: 'indonesia', url: 'https://rcti.mncnow.id/live/eds/RCTI/sa_hls/RCTI-02.m3u8' },
    { name: 'RTV', logo: 'https://www.rtv.co.id/logo.png', group: 'indonesia', url: 'https://rtv.mncnow.id/live/eds/RTV/sa_hls/RTV-02.m3u8' },
    { name: 'GTV', logo: 'https://www.gtv.com/logo.png', group: 'indonesia', url: 'https://gtv.mncnow.id/live/eds/GTV/sa_hls/GTV-02.m3u8' },
    { name: 'ANTV', logo: 'https://www.antv.com/logo.png', group: 'indonesia', url: 'https://antv.mncnow.id/live/eds/ANTV/sa_hls/ANTV-02.m3u8' },
    { name: 'TRANS7', logo: 'https://www.trans7.com/logo.png', group: 'indonesia', url: 'https://trans7.mncnow.id/live/eds/Trans7/sa_hls/Trans7-02.m3u8' },
    { name: 'MNCTV', logo: 'https://www.mnctv.com/logo.png', group: 'indonesia', url: 'https://mncvision.mncnow.id/live/eds/MNCTV/sa_hls/MNCTV-02.m3u8' },
    { name: 'INDOSIAR', logo: 'https://www.indosiar.com/logo.png', group: 'indonesia', url: 'https://indosiar.mncnow.id/live/eds/Indosiar/sa_hls/Indosiar-02.m3u8' },
    { name: 'SCTV', logo: 'https://www.sctv.com/logo.png', group: 'indonesia', url: 'https://sctv.mncnow.id/live/eds/SCTV/sa_hls/SCTV-02.m3u8' },
    { name: 'METRO TV', logo: 'https://www.metrotv.com/logo.png', group: 'berita', url: 'https://metrotv.mncnow.id/live/eds/MetroTV/sa_hls/MetroTV-02.m3u8' },
    { name: 'KOMPAS TV', logo: 'https://www.kompas.tv/logo.png', group: 'berita', url: 'https://kompastv.mncnow.id/live/eds/KompasTV/sa_hls/KompasTV-02.m3u8' },
    { name: 'TVRI', logo: 'https://www.tvri.go.id/logo.png', group: 'indonesia', url: 'https://tvri.mncnow.id/live/eds/TVRI/sa_hls/TVRI-02.m3u8' }
  ];

  // Save favorites to localStorage
  function saveFavorites() {
    localStorage.setItem('sendytv_favorites', JSON.stringify(favorites));
    renderFavorites();
    render();
  }

  // Toggle favorite
  function toggleFavorite(channel) {
    const index = favorites.findIndex(fav => fav.url === channel.url);
    if (index === -1) {
      favorites.push(channel);
    } else {
      favorites.splice(index, 1);
    }
    saveFavorites();
  }

  // Check if channel is favorite
  function isFavorite(channel) {
    return favorites.some(fav => fav.url === channel.url);
  }

  // Render favorites
  function renderFavorites() {
    if (!favoriteSection) return;
    
    if (favorites.length === 0) {
      favoriteSection.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:25px; color:#8fa9ff; background:#101b30; border-radius:40px; border:1px solid #2563eb;">
        <i class="far fa-star" style="font-size:2rem; margin-bottom:10px;"></i><br>// belum ada favorit
      </div>`;
      favoriteCountSpan.innerText = '0';
      return;
    }

    let html = '';
    favorites.forEach(ch => {
      const logoUrl = ch.logo || `https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}`;
      html += `
        <div class="favorite-card" onclick="play('${ch.url}')">
          <img src="${logoUrl}" onerror="this.src='https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}';">
          <div class="favorite-info">
            <div class="favorite-name">${ch.name}</div>
            <div class="favorite-group">${ch.group || 'umum'}</div>
          </div>
          <div class="remove-fav" onclick="event.stopPropagation(); removeFavorite('${ch.url}')">
            <i class="fas fa-times"></i>
          </div>
        </div>
      `;
    });
    favoriteSection.innerHTML = html;
    favoriteCountSpan.innerText = favorites.length;
  }

  // Remove from favorites
  window.removeFavorite = function(url) {
    favorites = favorites.filter(fav => fav.url !== url);
    saveFavorites();
  };

  // Parse M3U
  function parseM3U(text) {
    const lines = text.split("\n");
    let currentChannel = null;
    channels = [];

    lines.forEach(line => {
      line = line.trim();

      if (line.startsWith("#EXTINF")) {
        let name = line.split(",").pop() || "Untitled";
        let logo = (line.match(/tvg-logo="(.*?)"/) || [])[1];
        let group = (line.match(/group-title="(.*?)"/) || [])[1] || "Lainnya";

        currentChannel = {
          name: name,
          logo: logo,
          group: group,
        };
      } else if (line && !line.startsWith("#") && currentChannel) {
        currentChannel.url = line;
        channels.push(currentChannel);
        currentChannel = null;
      }
    });

    // Add Indonesian channels
    addIndonesianChannels();

    filtered = [...channels];
    applyFilter(activeFilter);
    renderFavorites();
  }

  // Add Indonesian channels if not exists
  function addIndonesianChannels() {
    indonesianChannels.forEach(indoChan => {
      const exists = channels.some(ch => 
        ch.name.toLowerCase().includes(indoChan.name.toLowerCase()) || 
        (ch.url && ch.url.includes(indoChan.url?.split('/')[2] || ''))
      );
      
      if (!exists) {
        channels.push(indoChan);
      }
    });
  }

  // Filter category
  function filterCategory(category) {
    activeFilter = category;
    
    categoryBtns.forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent.includes('~semua') && category === 'semua') btn.classList.add('active');
      if (btn.textContent.includes('~indonesia') && category === 'indonesia') btn.classList.add('active');
    });

    applyFilter(category);
  }

  // Apply filter
  function applyFilter(category) {
    if (category === 'semua') {
      filtered = [...channels];
    } else if (category === 'indonesia') {
      filtered = channels.filter(ch => 
        ch.group?.toLowerCase().includes('indonesia') || 
        ch.name?.toLowerCase().includes('indonesia') ||
        indonesianChannels.some(ic => ic.name.toLowerCase() === ch.name.toLowerCase())
      );
      
      if (filtered.length === 0) {
        filtered = indonesianChannels;
      }
    } else {
      filtered = [...channels];
    }

    render();
  }

  // Render channel list
  function render() {
    if (!channelsEl) return;

    if (filtered.length === 0) {
      channelsEl.innerHTML = `<div class="no-result"><i class="fa-regular fa-frown" style="font-size:2rem; margin-bottom:10px;"></i>// tidak ada channel</div>`;
      channelCountSpan.innerText = '0';
      return;
    }

    let html = '';
    filtered.slice(0, 50).forEach(ch => {
      const logoUrl = ch.logo || `https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}`;
      const favClass = isFavorite(ch) ? 'active' : '';
      
      const channelStr = JSON.stringify(ch).replace(/"/g, '&quot;');
      
      html += `
        <div class="channel-card">
          <button class="favorite-btn ${favClass}" onclick="event.stopPropagation(); toggleFavorite(${channelStr})">
            <i class="fa${isFavorite(ch) ? 's' : 'r'} fa-star"></i>
          </button>
          <img class="channel-logo" src="${logoUrl}" 
               alt="${ch.name}" loading="lazy" 
               onerror="this.src='https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}';"
               onclick="play('${ch.url}')">
          <div class="channel-info" onclick="play('${ch.url}')">
            <div class="channel-name">${ch.name}</div>
            <div class="channel-group"><i class="fa-regular fa-folder" style="margin-right: 4px;"></i>${ch.group || 'umum'}</div>
          </div>
        </div>
      `;
    });

    channelsEl.innerHTML = html;
    channelCountSpan.innerText = filtered.length;
  }

  // Play function
  window.play = function(url) {
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (Hls.isSupported() && url.includes('.m3u8')) {
      const hls = new Hls({ 
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 30 
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(e => console.log('autoplay blocked', e));
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl') || !url.includes('.m3u8')) {
      video.src = url;
      video.addEventListener('loadedmetadata', () => {
        video.play().catch(e => console.log('autoplay prevented', e));
      });
    } else {
      video.src = url;
      video.play().catch(e => console.log('fallback play error', e));
    }
  };

  // Search
  let searchTimeout;
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = searchEl.value.trim().toLowerCase();
      if (q === '') {
        filtered = [...channels];
        applyFilter(activeFilter);
      } else {
        filtered = channels.filter(ch => 
          ch.name.toLowerCase().includes(q) || 
          (ch.group && ch.group.toLowerCase().includes(q))
        );
        render();
      }
    }, 200);
  });

  // Fetch playlist
  fetch(playlistURL)
    .then(r => {
      if (!r.ok) throw new Error('Gagal ambil playlist');
      return r.text();
    })
    .then(parseM3U)
    .catch(err => {
      console.error(err);
      channels = [...indonesianChannels];
      filtered = [...channels];
      render();
      renderFavorites();
    });

  // Global functions
  window.filterCategory = filterCategory;
  window.toggleFavorite = toggleFavorite;
</script>

</body>
</html>
