<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendyTV • Live TV</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1120 0%, #0f1a2f 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header SendyTV */
    .sendy-header {
      background: linear-gradient(90deg, #0f1f40 0%, #1a2b50 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #3b82f6;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.7);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 2.2rem;
      color: #3b82f6;
      filter: drop-shadow(0 0 10px #3b82f6);
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #a0c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .logo-text span {
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .dashboard-link {
      background: rgba(255,255,255,0.1);
      border: 1px solid #3b70cf;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dashboard-link:hover {
      background: #2563eb;
      border-color: white;
    }

    /* Search header */
    .search-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(2, 6, 23, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px 20px;
    }

    .search-wrapper {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: rgba(15, 25, 40, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 8px 16px 8px 20px;
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .search-box:focus-within {
      border-color: #3b82f6;
      background: rgba(20, 30, 50, 0.9);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
    }

    .search-box i {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-right: 12px;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1rem;
      padding: 8px 0;
    }

    .search-box input::placeholder {
      color: #5f6c86;
      font-weight: 300;
    }

    /* Category tabs */
    .category-tabs {
      max-width: 1200px;
      margin: 20px auto 10px;
      padding: 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .category-btn {
      background: rgba(20, 35, 60, 0.6);
      border: 1px solid #314e7a;
      color: #b9d0ff;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-btn i {
      font-size: 1rem;
    }

    .category-btn:hover, .category-btn.active {
      background: #2563eb;
      border-color: #97bbff;
      color: white;
      box-shadow: 0 8px 18px -6px #1e4bb3;
    }

    .category-btn.active {
      background: #2563eb;
      border-color: white;
    }

    /* Player section */
    .player-section {
      background: #050a15;
      padding: 20px 20px 10px 20px;
      border-bottom: 1px solid #1e2a44;
    }

    #player {
      max-width: 1000px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 40px -10px black;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #000;
    }

    video {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      background: black;
    }

    /* Channel stats */
    .channel-stats {
      max-width: 1000px;
      margin: 18px auto 8px auto;
      padding: 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #a0b3d9;
      font-size: 0.9rem;
    }

    .badge {
      background: #1e2c48;
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.8rem;
      color: #b9d0ff;
      border: 1px solid #314b74;
    }

    /* Favorite section (disematkan di atas) */
    .favorite-section {
      max-width: 1200px;
      margin: 20px auto 10px;
      padding: 0 20px;
    }

    .favorite-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      background: rgba(59, 130, 246, 0.15);
      padding: 12px 20px;
      border-radius: 60px;
      border: 1px solid #3b82f6;
      backdrop-filter: blur(5px);
    }

    .favorite-header i {
      color: #fbbf24;
      font-size: 1.5rem;
      filter: drop-shadow(0 0 8px gold);
    }

    .favorite-header h3 {
      font-size: 1.3rem;
      font-weight: 600;
      color: white;
    }

    .favorite-header span {
      background: #2563eb;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      margin-left: 10px;
    }

    #favorite-channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 30px;
    }

    .favorite-card {
      background: rgba(30, 45, 75, 0.8);
      backdrop-filter: blur(4px);
      border: 2px solid #fbbf24;
      border-radius: 20px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
      position: relative;
    }

    .favorite-card:hover {
      transform: translateY(-4px);
      border-color: #ffd966;
      background: #2f4680;
    }

    .favorite-card img {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #fbbf24;
    }

    .favorite-info {
      flex: 1;
    }

    .favorite-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #ffefb0;
    }

    .favorite-group {
      font-size: 0.7rem;
      color: #b0c6f0;
    }

    .remove-fav {
      position: absolute;
      top: 4px;
      right: 4px;
      color: #ff6b6b;
      font-size: 0.8rem;
      padding: 4px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .remove-fav:hover {
      background: #ff4444;
      color: white;
    }

    /* Grid channel list */
    .channels-container {
      max-width: 1200px;
      margin: 10px auto 30px auto;
      padding: 0 20px;
    }

    #channels {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .channel-card {
      background: rgba(15, 25, 45, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid #253450;
      border-radius: 20px;
      padding: 18px 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s ease;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .channel-card:hover {
      background: #1f314f;
      border-color: #3b5b9e;
      transform: translateY(-4px);
      box-shadow: 0 14px 26px -6px #0f1f40;
    }

    .favorite-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #cbd5e1;
      font-size: 1rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      z-index: 5;
    }

    .favorite-btn:hover {
      background: #2563eb;
      color: white;
    }

    .favorite-btn.active {
      color: #fbbf24;
    }

    .favorite-btn.active:hover {
      color: #ff6b6b;
    }

    .channel-logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #122137;
      object-fit: cover;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      border: 1px solid #3f5680;
      cursor: pointer;
    }

    .channel-info {
      flex: 1;
      overflow: hidden;
      cursor: pointer;
    }

    .channel-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f0f4ff;
      padding-right: 25px;
    }

    .channel-group {
      font-size: 0.7rem;
      color: #8fa4d0;
      margin-top: 4px;
      display: inline-block;
      background: rgba(45, 70, 120, 0.4);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid #314e7a;
      text-transform: capitalize;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #5f7bbf;
      font-size: 1.2rem;
    }

    @media (max-width: 600px) {
      #channels {
        grid-template-columns: 1fr;
      }
      .channel-card {
        padding: 14px;
      }
      .sendy-header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0a1425;
    }
    ::-webkit-scrollbar-thumb {
      background: #25406a;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3b5e96;
    }

    .no-result {
      grid-column: 1/-1;
      text-align: center;
      padding: 40px 20px;
      background: #0f1a2b;
      border-radius: 40px;
      border: 1px dashed #3a5270;
      color: #95abda;
    }
  </style>
</head>
<body>

<!-- Header SendyTV -->
<header class="sendy-header">
  <div class="logo-area">
    <i class="fas fa-tv-retro logo-icon"></i>
    <div class="logo-text">Sendy<span>TV</span></div>
  </div>
  <a href="index.html" class="dashboard-link">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</header>

<!-- Search header -->
<div class="search-header">
  <div class="search-wrapper">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search" placeholder="Cari channel atau kategori...">
    </div>
  </div>
</div>

<!-- Category tabs -->
<div class="category-tabs">
  <button class="category-btn active" onclick="filterCategory('semua')"><i class="fas fa-tv"></i> Semua</button>
  <button class="category-btn" onclick="filterCategory('indonesia')"><i class="fas fa-flag"></i> Indonesia</button>
</div>

<!-- Player section -->
<div class="player-section">
  <div id="player">
    <video id="video" controls playsinline></video>
  </div>
  <div class="channel-stats">
    <span><i class="fas fa-tv" style="margin-right: 6px;"></i><span id="channel-count">0</span> channel</span>
    <span class="badge"><i class="fas fa-circle" style="color: #10b981; font-size: 0.5rem;"></i> LIVE</span>
  </div>
</div>

<!-- Favorite section (channel yang disematkan) -->
<div class="favorite-section">
  <div class="favorite-header">
    <i class="fas fa-star"></i>
    <h3>Channel Favorite<span id="favorite-count">0</span></h3>
    <i class="fas fa-thumbtack" style="color: #fbbf24; margin-left: auto;"></i>
  </div>
  <div id="favorite-channels">
    <!-- Akan diisi JavaScript -->
  </div>
</div>

<!-- Channels container -->
<div class="channels-container">
  <div id="channels">
    <div class="loading-state">
      <i class="fas fa-spinner fa-pulse" style="margin-right: 8px;"></i> Memuat daftar channel...
    </div>
  </div>
</div>

<script>
  const playlistURL = "https://iptv-org.github.io/iptv/index.m3u";

  let channels = [];
  let filtered = [];
  let activeFilter = 'semua';
  
  // Load favorites from localStorage
  let favorites = JSON.parse(localStorage.getItem('sendytv_favorites')) || [];

  const channelsEl = document.getElementById("channels");
  const searchEl = document.getElementById("search");
  const video = document.getElementById("video");
  const channelCountSpan = document.getElementById("channel-count");
  const categoryBtns = document.querySelectorAll('.category-btn');
  const favoriteSection = document.getElementById('favorite-channels');
  const favoriteCountSpan = document.getElementById('favorite-count');

  // Daftar channel Indonesia dengan URL yang sudah diperbarui
  const indonesianChannels = [
    { name: 'RCTI', logo: 'https://upload.wikimedia.org/wikipedia/id/6/6c/RCTI.png', group: 'Indonesia', url: 'https://rcti.mncnow.id/live/eds/RCTI/sa_hls/RCTI-02.m3u8' },
    { name: 'RTV', logo: 'https://www.rtv.co.id/logo.png', group: 'Indonesia', url: 'https://rtv.mncnow.id/live/eds/RTV/sa_hls/RTV-02.m3u8' },
    { name: 'GTV', logo: 'https://www.gtv.com/logo.png', group: 'Indonesia', url: 'https://gtv.mncnow.id/live/eds/GTV/sa_hls/GTV-02.m3u8' },
    { name: 'ANTV', logo: 'https://www.antv.com/logo.png', group: 'Indonesia', url: 'https://antv.mncnow.id/live/eds/ANTV/sa_hls/ANTV-02.m3u8' },
    { name: 'TRANS7', logo: 'https://www.trans7.com/logo.png', group: 'Indonesia', url: 'https://trans7.mncnow.id/live/eds/Trans7/sa_hls/Trans7-02.m3u8' },
    { name: 'MNCTV', logo: 'https://www.mnctv.com/logo.png', group: 'Indonesia', url: 'https://mncvision.mncnow.id/live/eds/MNCTV/sa_hls/MNCTV-02.m3u8' },
    { name: 'INDOSIAR', logo: 'https://www.indosiar.com/logo.png', group: 'Indonesia', url: 'https://indosiar.mncnow.id/live/eds/Indosiar/sa_hls/Indosiar-02.m3u8' },
    { name: 'SCTV', logo: 'https://www.sctv.com/logo.png', group: 'Indonesia', url: 'https://sctv.mncnow.id/live/eds/SCTV/sa_hls/SCTV-02.m3u8' },
    { name: 'METRO TV', logo: 'https://www.metrotv.com/logo.png', group: 'Berita', url: 'https://metrotv.mncnow.id/live/eds/MetroTV/sa_hls/MetroTV-02.m3u8' },
    { name: 'KOMPAS TV', logo: 'https://www.kompas.tv/logo.png', group: 'Berita', url: 'https://kompastv.mncnow.id/live/eds/KompasTV/sa_hls/KompasTV-02.m3u8' },
    { name: 'TVRI', logo: 'https://www.tvri.go.id/logo.png', group: 'Indonesia', url: 'https://tvri.mncnow.id/live/eds/TVRI/sa_hls/TVRI-02.m3u8' }
  ];

  // Save favorites to localStorage
  function saveFavorites() {
    localStorage.setItem('sendytv_favorites', JSON.stringify(favorites));
    renderFavorites();
    render(); // Refresh tombol favorit di channel list
  }

  // Toggle favorite
  function toggleFavorite(channel) {
    const index = favorites.findIndex(fav => fav.url === channel.url);
    if (index === -1) {
      favorites.push(channel);
    } else {
      favorites.splice(index, 1);
    }
    saveFavorites();
  }

  // Check if channel is favorite
  function isFavorite(channel) {
    return favorites.some(fav => fav.url === channel.url);
  }

  // Render favorites section
  function renderFavorites() {
    if (!favoriteSection) return;
    
    if (favorites.length === 0) {
      favoriteSection.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:20px; color:#8fa4d0; background:#1a2740; border-radius:40px;">
        <i class="far fa-star" style="font-size:2rem; margin-bottom:10px;"></i><br>Belum ada channel favorit.
      </div>`;
      favoriteCountSpan.innerText = '0';
      return;
    }

    let html = '';
    favorites.forEach(ch => {
      const logoUrl = ch.logo || `https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}`;
      html += `
        <div class="favorite-card" onclick="play('${ch.url}')">
          <img src="${logoUrl}" onerror="this.src='https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}';">
          <div class="favorite-info">
            <div class="favorite-name">${ch.name}</div>
            <div class="favorite-group">${ch.group || 'Umum'}</div>
          </div>
          <div class="remove-fav" onclick="event.stopPropagation(); removeFavorite('${ch.url}')">
            <i class="fas fa-times"></i>
          </div>
        </div>
      `;
    });
    favoriteSection.innerHTML = html;
    favoriteCountSpan.innerText = favorites.length;
  }

  // Remove from favorites
  window.removeFavorite = function(url) {
    favorites = favorites.filter(fav => fav.url !== url);
    saveFavorites();
  };

  // Parse M3U playlist
  function parseM3U(text) {
    const lines = text.split("\n");
    let currentChannel = null;
    channels = [];

    lines.forEach(line => {
      line = line.trim();

      if (line.startsWith("#EXTINF")) {
        let name = line.split(",").pop() || "Untitled";
        let logo = (line.match(/tvg-logo="(.*?)"/) || [])[1];
        let group = (line.match(/group-title="(.*?)"/) || [])[1] || "Lainnya";

        currentChannel = {
          name: name,
          logo: logo,
          group: group,
        };
      } else if (line && !line.startsWith("#") && currentChannel) {
        currentChannel.url = line;
        channels.push(currentChannel);
        currentChannel = null;
      }
    });

    // Add Indonesian channels
    addIndonesianChannels();

    filtered = [...channels];
    applyFilter(activeFilter);
    renderFavorites();
  }

  // Add Indonesian channels if not exists
  function addIndonesianChannels() {
    indonesianChannels.forEach(indoChan => {
      const exists = channels.some(ch => 
        ch.name.toLowerCase().includes(indoChan.name.toLowerCase()) || 
        (ch.url && ch.url.includes(indoChan.url?.split('/')[2] || ''))
      );
      
      if (!exists) {
        channels.push(indoChan);
      }
    });
  }

  // Filter category
  function filterCategory(category) {
    activeFilter = category;
    
    categoryBtns.forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent.toLowerCase().includes(category) || 
          (category === 'semua' && btn.textContent.includes('Semua')) ||
          (category === 'indonesia' && btn.textContent.includes('Indonesia')) ||
          (category === 'rekomendasi' && btn.textContent.includes('Rekomendasi')) ||
          (category === 'favorit' && btn.textContent.includes('Favorit'))) {
        btn.classList.add('active');
      }
    });

    applyFilter(category);
  }

  // Apply filter
  function applyFilter(category) {
    if (category === 'semua') {
      filtered = [...channels];
    } else if (category === 'indonesia') {
      filtered = channels.filter(ch => 
        ch.group?.toLowerCase().includes('indonesia') || 
        ch.name?.toLowerCase().includes('indonesia') ||
        indonesianChannels.some(ic => ic.name.toLowerCase() === ch.name.toLowerCase())
      );
      
      if (filtered.length === 0) {
        filtered = indonesianChannels;
      }
    } else if (category === 'rekomendasi') {
      const rekomendasiNama = ['RCTI', 'RTV', 'GTV', 'ANTV', 'TRANS7', 'MNCTV', 'INDOSIAR', 'CNN', 'BBC', 'METRO TV'];
      filtered = channels.filter(ch => 
        rekomendasiNama.some(nama => ch.name.toLowerCase().includes(nama.toLowerCase()))
      );
      
      if (filtered.length < 6) {
        filtered = [...filtered, ...indonesianChannels.slice(0, 6)];
      }
    } else if (category === 'favorit') {
      filtered = favorites.length > 0 ? [...favorites] : [];
    }

    if (filtered.length === 0 && category !== 'favorit') {
      filtered = [...channels];
    }

    render();
  }

  // Render channel list
  function render() {
    if (!channelsEl) return;

    if (filtered.length === 0) {
      channelsEl.innerHTML = `<div class="no-result"><i class="fa-regular fa-frown" style="font-size:2rem; margin-bottom:10px; display:block;"></i>Tidak ada channel ditemukan</div>`;
      channelCountSpan.innerText = '0';
      return;
    }

    let html = '';
    filtered.slice(0, 50).forEach(ch => {
      const logoUrl = ch.logo || `https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}`;
      const favClass = isFavorite(ch) ? 'active' : '';
      
      // Escape channel object for onclick
      const channelStr = JSON.stringify(ch).replace(/"/g, '&quot;');
      
      html += `
        <div class="channel-card">
          <button class="favorite-btn ${favClass}" onclick="event.stopPropagation(); toggleFavorite(${channelStr})">
            <i class="fa${isFavorite(ch) ? 's' : 'r'} fa-star"></i>
          </button>
          <img class="channel-logo" src="${logoUrl}" 
               alt="${ch.name}" loading="lazy" 
               onerror="this.src='https://placehold.co/60x60/1e2b44/white?text=${ch.name.charAt(0)}';"
               onclick="play('${ch.url}')">
          <div class="channel-info" onclick="play('${ch.url}')">
            <div class="channel-name">${ch.name}</div>
            <div class="channel-group"><i class="fa-regular fa-folder" style="margin-right: 4px;"></i>${ch.group || 'Umum'}</div>
          </div>
        </div>
      `;
    });

    channelsEl.innerHTML = html;
    channelCountSpan.innerText = filtered.length;
  }

  // Play function
  window.play = function(url) {
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (Hls.isSupported() && url.includes('.m3u8')) {
      const hls = new Hls({ 
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 30 
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(e => console.log('autoplay blocked', e));
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl') || !url.includes('.m3u8')) {
      video.src = url;
      video.addEventListener('loadedmetadata', () => {
        video.play().catch(e => console.log('autoplay prevented', e));
      });
    } else {
      video.src = url;
      video.play().catch(e => console.log('fallback play error', e));
    }
  };

  // Search with debounce
  let searchTimeout;
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = searchEl.value.trim().toLowerCase();
      if (q === '') {
        filtered = [...channels];
        applyFilter(activeFilter);
      } else {
        filtered = channels.filter(ch => 
          ch.name.toLowerCase().includes(q) || 
          (ch.group && ch.group.toLowerCase().includes(q))
        );
        render();
      }
    }, 200);
  });

  // Fetch playlist
  fetch(playlistURL)
    .then(r => {
      if (!r.ok) throw new Error('Gagal ambil playlist');
      return r.text();
    })
    .then(parseM3U)
    .catch(err => {
      console.error(err);
      channels = [...indonesianChannels];
      filtered = [...channels];
      render();
      renderFavorites();
    });

  // Global functions
  window.filterCategory = filterCategory;
  window.toggleFavorite = toggleFavorite;
</script>

</body>
</html>
